<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyro Depth Scene</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
      background: radial-gradient(circle at center, #0a0a1a, #000);
      perspective: 1000px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene {
      width: 300px;
      height: 500px;
      position: relative;
      transform-style: preserve-3d;
    }

    .layer {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
    }

    .back {
      background: url('https://picsum.photos/400/600?blur=5') center/cover;
      transform: translateZ(-80px);
    }

    .middle {
      background: url('https://picsum.photos/400/600?grayscale') center/cover;
      transform: translateZ(-30px);
    }

    .front {
      background: url('https://picsum.photos/400/600') center/cover;
      transform: translateZ(20px);
      box-shadow: 0 0 40px rgba(0,255,255,0.3);
    }

    button {
      position: absolute;
      bottom: 30px;
      padding: 12px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: cyan;
    }
  </style>
</head>
<body>

<div class="scene" id="scene">
  <div class="layer back"></div>
  <div class="layer middle"></div>
  <div class="layer front"></div>
</div>

<button id="startBtn">Enable Motion</button>

<script>
const scene = document.getElementById("scene");
const btn = document.getElementById("startBtn");

function handleOrientation(e) {
  let x = e.gamma;  // left-right
  let y = e.beta;   // front-back

  let rotateY = x * 0.6;
  let rotateX = y * 0.6;

  scene.style.transform = `rotateY(${rotateY}deg) rotateX(${-rotateX}deg)`;
}

btn.addEventListener("click", () => {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission().then(res => {
      if (res === "granted") {
        window.addEventListener("deviceorientation", handleOrientation);
        btn.style.display = "none";
      }
    });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
    btn.style.display = "none";
  }
});
</script>

</body>
</html>

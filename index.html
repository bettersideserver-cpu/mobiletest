<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyro Card Stack</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #0f0f1f, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  perspective: 1200px;
  font-family: sans-serif;
}

.stack {
  width: 260px;
  height: 420px;
  position: relative;
  transform-style: preserve-3d;
}

.card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  background: white;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  font-weight: bold;
  transition: transform 0.4s ease, opacity 0.4s ease;
  touch-action: none;
}

.card:nth-child(1) { z-index: 3; background: #ff7675; }
.card:nth-child(2) { z-index: 2; background: #74b9ff; transform: translateZ(-40px) scale(0.95); }
.card:nth-child(3) { z-index: 1; background: #55efc4; transform: translateZ(-80px) scale(0.9); }

button {
  position: absolute;
  bottom: 20px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>
<body>

<div class="stack" id="stack">
  <div class="card" data-link="http://mdbthelutyens.in/">MDB The Lutyens</div>
  <div class="card" data-link="http://www.cminfiniaimmersive.com/">CM Infinia</div>
  <div class="card" data-link="https://bettersideserver-cpu.github.io/AnantaStreet/">Ananta</div>
</div>

<button id="startBtn">Enable Motion</button>

<script>
const stack = document.getElementById("stack");
const btn = document.getElementById("startBtn");
let currentCard = stack.children[0];

// 🎯 GYRO DEPTH
function handleOrientation(e) {
  let x = e.gamma * 0.4;
  let y = e.beta * 0.4;
  stack.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
}

btn.addEventListener("click", () => {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission().then(res => {
      if (res === "granted") {
        window.addEventListener("deviceorientation", handleOrientation);
        btn.style.display = "none";
      }
    });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
    btn.style.display = "none";
  }
});

// 🖐 SWIPE LOGIC
let startX = 0;
let currentX = 0;
let isDragging = false;

stack.addEventListener("touchstart", e => {
  currentCard = stack.children[0];
  startX = e.touches[0].clientX;
  isDragging = true;
});

stack.addEventListener("touchmove", e => {
  if (!isDragging) return;
  currentX = e.touches[0].clientX - startX;
  currentCard.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.1}deg)`;
});

stack.addEventListener("touchend", () => {
  isDragging = false;

  if (Math.abs(currentX) > 100) {
    let direction = currentX > 0 ? 1 : -1;
    currentCard.style.transform = `translateX(${direction * 500}px) rotate(${direction * 45}deg)`;
    currentCard.style.opacity = 0;

    setTimeout(() => {
      currentCard.style.transition = "none";
      currentCard.style.transform = "";
      currentCard.style.opacity = 1;
      stack.appendChild(currentCard);
      setTimeout(() => currentCard.style.transition = "transform 0.4s ease, opacity 0.4s ease");
    }, 400);
  } else {
    currentCard.style.transform = "";
  }

  currentX = 0;
});

// 🔗 OPEN LINK ON TAP
stack.addEventListener("click", e => {
  if (Math.abs(currentX) < 5) {
    let card = stack.children[0];
    window.location.href = card.dataset.link;
  }
});
</script>

</body>
</html>
